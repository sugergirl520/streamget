name: Build StreamGetGUI

permissions:
  contents: write

on:
  push:
    tags:
      - v_GUI.*
  workflow_dispatch:

jobs:
  create_release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: 获取版本号
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION=$(date -u +%Y%m%d%H%M%S)
          else
            VERSION=${GITHUB_REF#refs/tags/}
            VERSION=${VERSION/v_gui./}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: 为 workflow_dispatch 创建标签
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag v_gui.${{ steps.get_version.outputs.version }}
          git push origin v_gui.${{ steps.get_version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create_release
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install customtkinter pillow
      - name: Build executable
        run: |
          python compile_gui.py --path streamget_gui_modern_horizontal.py --name StreamGetGUI
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v_gui.${{ needs.create_release.outputs.version }}
          name: StreamGet GUI ${{ needs.create_release.outputs.version }}
          files: dist/StreamGetGUI.exe
          draft: false
          prerelease: false

  build-linux:
    needs: create_release
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-dev
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install customtkinter pillow
      - name: Build executable
        run: |
          python compile_gui.py --path streamget_gui_modern_horizontal.py --name StreamGetGUI
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v_gui.${{ needs.create_release.outputs.version }}
          name: StreamGet GUI ${{ needs.create_release.outputs.version }}
          files: dist/StreamGetGUI
          draft: false
          prerelease: false
